<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff9df" stop-opacity=".34"/>
      <stop offset=".58" stop-color="#fff2bf" stop-opacity=".16"/>
      <stop offset="1" stop-color="#ffe8a6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="patch" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#fffce9" stop-opacity=".7"/>
      <stop offset="1" stop-color="#ffeab0" stop-opacity=".42"/>
    </linearGradient>
    <filter id="soft-beam" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
    <filter id="soft-patch" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- Window light remains independent from the generated architectural base. -->
  <path d="M960 58h126l104 292H842z" fill="url(#beam)" filter="url(#soft-beam)"/>

  <!-- Soft perspective light patch on the kitchen tile. -->
  <path d="M934 136h132l94 186H888z" fill="url(#patch)" filter="url(#soft-patch)"/>

  <!-- Window-frame shadow projected within the patch. -->
  <g fill="#6a5849" fill-opacity=".18" filter="url(#soft-shadow)">
    <path d="M994 137h10l65 184h-14z"/>
    <path d="M935 205h166l7 13H942z"/>
  </g>

  <!-- A few restrained reflected light spots, not gameplay markers. -->
  <g fill="#fff6cf" fill-opacity=".18" filter="url(#soft-patch)">
    <ellipse cx="1130" cy="306" rx="54" ry="18"/>
    <ellipse cx="915" cy="328" rx="40" ry="12"/>
  </g>
</svg>
